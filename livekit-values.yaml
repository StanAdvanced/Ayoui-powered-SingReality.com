# LiveKit SFU Enterprise GKE Multi-Region Deployment for SingReality
# Highly Scalable Configuration optimized for VR Pose Tracking, Spatial Audio (SUMF), and 10,000+ Concurrent Users
# Global region routing and AI choreography support.

replicaCount: 15

image:
  repository: livekit/livekit-server
  pullPolicy: IfNotPresent
  tag: "v1.5.0"

livekit:
  log_level: info
  port: 7880
  rtc:
    tcp_port: 7881
    udp_port: 7882
    use_external_ip: true
    port_range_start: 50000
    port_range_end: 60000
    # Enable WebRTC optimizations for high density spatial audio
    stun_servers: 
      - stun:stun.l.google.com:19302
      - stun:stun1.l.google.com:19302
  turn:
    enabled: true
    domain: turn.singreality.com
    tls_port: 5349
    udp_port: 3478
  redis:
    address: "redis-master.singreality-global.svc.cluster.local:6379"
    password: "${REDIS_PASSWORD}"
    # Optimized for massive pub/sub for synchronization of user coordinates
  keys:
    # Managed securely via Secret manager
    api_key: "${LIVEKIT_API_KEY}"
    api_secret: "${LIVEKIT_API_SECRET}"
  room:
    empty_timeout: 300
    max_participants: 10000 # SingReality Arena Size Limit
  audio:
    # High-fidelity Opus settings
    bitrate: 128000
    channels: 2 

resources:
  limits:
    cpu: "8"
    memory: "16Gi"
  requests:
    cpu: "4"
    memory: "8Gi"

autoscaling:
  enabled: true
  minReplicas: 10
  maxReplicas: 50
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector:
  type: rtc-compute
  cloud.google.com/gke-nodepool: vr-spatial-audio-pool

# Multi-region affinities and topology spread constraints
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: livekit-server

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - livekit-server
        topologyKey: "kubernetes.io/hostname"

service:
  type: LoadBalancer
  annotations:
    cloud.google.com/load-balancer-type: "External"
    cloud.google.com/network-tier: "Premium"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: rtc.singreality.com
      paths:
        - path: /
          pathType: Prefix

prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s

tolerations:
  - key: "sku"
    operator: "Equal"
    value: "gpu-ai-nodes"
    effect: "NoSchedule"
