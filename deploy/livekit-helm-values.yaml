# LiveKit SFU - Production scale for SingReality (10,000+ Concurrent VR/AR Streams)
# Designed for GKE Multi-Region, Quantum-Resistant Encryption, Opus FEC, AR/VR Pose Data

replicaCount: 15

image:
  repository: livekit/livekit-server
  pullPolicy: IfNotPresent
  tag: "v1.5.0-singreality-quantum" # Custom built SingReality image

# High Availability Pod placement
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
    - labelSelector:
        matchExpressions:
        - key: app.kubernetes.io/name
          operator: In
          values:
          - livekit-server
      topologyKey: "topology.kubernetes.io/zone"

# Optimize Node Pools (Compute + Network intensive)
nodeSelector:
  cloud.google.com/gke-nodepool: "high-cpu-throughput-pool"
  
tolerations:
  - key: "network-intensity"
    operator: "Exists"
    effect: "NoSchedule"

# Port Expansion for 10,000+ users UDP stream (WebRTC)
port: 7880
rtc:
  portRange: "50000-60000"
  udpPort: 7882
  tcpPort: 7881

# Redis for State & Signaling
redis:
  enabled: true
  architecture: "replication"
  auth:
    enabled: true
    # Use Secret in production
    password: "quantum-secure-redis-pass"

# Webhooks for Monetization & VR Telemetry events
webhook:
  apiKey: "singreality-webhook-key"
  apiSecret: "singreality-webhook-secret"
  urls:
    - "https://api.singreality.com/v1/livekit/webhook/monetization" # Triggers Stripe tipping/NFT drops
    - "https://api.singreality.com/v1/livekit/webhook/vr-analytics"   # Feeds SUMF Engine

# Resource Limits - Production tuned
resources:
  requests:
    cpu: "8000m"
    memory: "16Gi"
  limits:
    cpu: "16000m"
    memory: "32Gi"

# Configuration payload passed to LiveKit
config:
  keys:
    "devkey": "devsecret" # DO NOT USE IN PRODUCTION
  
  # Log level tuned for AI Choreography and spatial debugging
  logging:
    json: true
    level: info
    pion_level: warn
  
  rtc:
    use_external_ip: true
    # WebRTC packet optimizations for Opus FEC/DRED and Spatial Audio
    packet_buffer_size: 1000
    max_bitrate: 4000000   # 4 Mbps per stream max (8K holographic)
    port_range: "50000-60000"
    
  turn:
    cert_file: "/tls/tls.crt"
    key_file: "/tls/tls.key"
    tls_port: 5349
    udp_port: 3478

  # AI Choreography Room settings
  room:
    empty_timeout: 300
    max_participants: 10000 # Mega-arena scale
    
    # Enable End-to-End Encryption (E2EE/PQC ready)
    enable_e2ee: true
    
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "livekit-ip"
    networking.gke.io/managed-certificates: "livekit-cert"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: live-arena.singreality.com
      paths:
        - path: /
          pathType: Prefix
